# https://pipewire.pages.freedesktop.org/wireplumber/daemon/configuration/modifying_configuration.html#working-with-rules
# https://docs.pipewire.org/page_man_pipewire-props_7.html
# wpctl status
# wpctl inpsect <id>
# systemctl --user restart wireplumber 

monitor.alsa.rules = [
  # disable unused motherboard nodes
  {
    matches = [
      {
	node.name = "alsa_output.usb-Generic_USB_Audio-00.HiFi__SPDIF__sink"
      }
      {
	node.name = "alsa_output.usb-Generic_USB_Audio-00.HiFi__Headphones__sink"
      }
      {
	device.name = "alsa_card.usb-Generic_USB_Audio-00"
      }
      {
	node.name = "alsa_input.usb-Generic_USB_Audio-00.HiFi__Line__source"
      }
      {
	node.name = "alsa_input.usb-Generic_USB_Audio-00.HiFi__Mic__source"
      }
      {
	node.name = "alsa_output.pci-0000_14_00.1.hdmi-surround71"
      }
    ]
    actions = {
      update-props = {
        node.disabled = true
      }
    }
  }
  # change nicks/descriptions
  {
    matches = [
      {
	node.name = "alsa_output.usb-Generic_USB_Audio-00.HiFi__Speaker__sink"
      }
    ]
    actions = {
      update-props = {
        node.nick = "Rear Headphones"
        node.description = "Rear Headphones"
	device.form-factor = "headphones"
	device.icon_name = "audio-headphones"
      }
    }
  }
]
