# See https://wiki.hypr.land/Configuring/Keywords/
# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more

$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, q, killactive
bind = $mainMod shift, q, forcekillactive
#bind = $mainMod, m, exit,
bind = $mainMod, f, togglefloating,
bind = $mainMod, f11, fullscreen, 1 toggle
bind = $mainMod shift, f11, fullscreen, 0 toggle

# Launch apps
bind = $mainMod, return, exec, $terminal
bind = $mainMod, space, exec, $menu
bind = $mainMod, e, exec, $fileManager
bind = $mainMod, b, exec, brave
bind = $mainMod shift, b, exec, brave --incognito

# Layout manipulation
# dwindle
#bind = $mainMod, p, pseudo,
bind = $mainMod, j, layoutmsg, togglesplit 
bind = $mainMod shift, j, layoutmsg, swapsplit

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
# Move active window with mainMod + shift + arrow keys
bind = $mainMod shift, left, movewindow, l
bind = $mainMod shift, right, movewindow, r
bind = $mainMod shift, up, movewindow, u
bind = $mainMod shift, down, movewindow, d
# Swap active window with mainMod + alt + arrow keys
bind = $mainMod alt, left, swapwindow, l
bind = $mainMod alt, right, swapwindow, r
bind = $mainMod alt, up, swapwindow, u
bind = $mainMod alt, down, swapwindow, d
# Resize active window with mainMod + ctrl + arrow keys
binde = $mainMod ctrl, left, resizeactive, -10 0
binde = $mainMod ctrl, right, resizeactive, 10 0
binde = $mainMod ctrl, up, resizeactive, 0 -10
binde = $mainMod ctrl, down, resizeactive, 0 10
# Switch workspaces with mainMod + page up/down
bind = $mainMod, Page_Up, workspace, -1
bind = $mainMod, Page_Down, workspace, +1

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod shift, 1, movetoworkspace, 1
bind = $mainMod shift, 2, movetoworkspace, 2
bind = $mainMod shift, 3, movetoworkspace, 3
bind = $mainMod shift, 4, movetoworkspace, 4
bind = $mainMod shift, 5, movetoworkspace, 5
bind = $mainMod shift, 6, movetoworkspace, 6
bind = $mainMod shift, 7, movetoworkspace, 7
bind = $mainMod shift, 8, movetoworkspace, 8
bind = $mainMod shift, 9, movetoworkspace, 9
bind = $mainMod shift, 0, movetoworkspace, 10

# Special workspaces
bind = $mainMod shift, return, togglespecialworkspace, term
bind = $mainMod, escape, exec, ~/.config/hypr/scripts/hide-special.sh

# Submap for comms
bind = $mainMod, c, submap, comms
submap = comms, reset
bind = , d, togglespecialworkspace, discord
bind = $mainMod, d, togglespecialworkspace, discord
bind = , w, togglespecialworkspace, whatsapp
bind = $mainMod, w, togglespecialworkspace, whatsapp
bind = , t, togglespecialworkspace, teamspeak3
bind = $mainMod, t, togglespecialworkspace, teamspeak3
bind = , catchall, submap, reset
submap = reset

# Audio controls
bind = $mainMod, m, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ 1
bind = $mainMod shift, m, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ 0
bind = $mainMod, a, submap, audio
submap = audio, reset
bind = , m, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ 1
bind = , u, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ 0
bind = , v, exec, pavucontrol
bind = , catchall, submap, reset
submap = reset

# Submap for gaming
bind = $mainMod, g, submap, gaming
submap = gaming, reset
bind = , g, togglespecialworkspace, game
bind = $mainMod, g, togglespecialworkspace, game
bind = , catchallo, submap, reset
submap = reset

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
